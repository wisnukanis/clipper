name: Podcast Clipper Automation

on:
  workflow_dispatch:
    inputs:
      theme:
        description: Theme to process
        required: false
        default: auto
      url:
        description: Optional YouTube URL for manual run
        required: false
        default: ""
      range:
        description: Optional manual range, example 00:01:20-00:02:05
        required: false
        default: ""

  schedule:
    # GitHub schedule uses UTC.
    # Target publish kira-kira:
    # 07:30 WIB pagi
    # 12:30 WIB jam istirahat
    # 19:30 WIB prime time malam
    #
    # Workflow mulai sekitar 10 menit lebih awal.
    # 00:17 UTC = 07:17 WIB
    # 05:17 UTC = 12:17 WIB
    # 12:17 UTC = 19:17 WIB
    - cron: "17 0 * * *"
    - cron: "17 5 * * *"
    - cron: "17 12 * * *"

concurrency:
  group: podcast-clipper-automation
  cancel-in-progress: false

permissions:
  contents: read
  actions: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    env:
      LOCAL_PORT: 8788
      APP_TIMEZONE: Asia/Jakarta

      PUBLIC_BASE_URL: ${{ secrets.PUBLIC_BASE_URL }}
      UPLOAD_DRIVER: ftp
      DRY_RUN: "false"
      AUTO_PUBLISH: "true"
      DEFAULT_THEME: auto

      GRAPH_API_VERSION: v25.0

      INSTAGRAM_UPLOAD_ENABLED: ${{ secrets.INSTAGRAM_UPLOAD_ENABLED || 'true' }}
      INSTAGRAM_REEL_UPLOAD_METHOD: ${{ secrets.INSTAGRAM_REEL_UPLOAD_METHOD || 'resumable' }}

      YOUTUBE_UPLOAD_ENABLED: ${{ secrets.YOUTUBE_UPLOAD_ENABLED || 'false' }}

      FTP_HOST: ${{ secrets.FTP_HOST }}
      FTP_PORT: ${{ secrets.FTP_PORT || '21' }}
      FTP_USER: ${{ secrets.FTP_USER }}
      FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
      FTP_REMOTE_DIR: ${{ secrets.FTP_REMOTE_DIR }}

      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
      GEMINI_API_KEY_3: ${{ secrets.GEMINI_API_KEY_3 }}
      GEMINI_API_KEYS: ${{ secrets.GEMINI_API_KEYS }}
      GEMINI_MODEL: ${{ secrets.GEMINI_MODEL || 'gemini-flash-latest' }}

      DEEPGRAM_ENABLED: ${{ secrets.DEEPGRAM_ENABLED || '1' }}
      DEEPGRAM_API_KEYS: ${{ secrets.DEEPGRAM_API_KEYS }}
      DEEPGRAM_MODEL: ${{ secrets.DEEPGRAM_MODEL || 'nova-3' }}
      DEEPGRAM_LANGUAGE: id

      INSTAGRAM_IG_USER_ID: ${{ secrets.INSTAGRAM_IG_USER_ID }}
      INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}

      YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
      YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
      YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
      YOUTUBE_PRIVACY_STATUS: ${{ secrets.YOUTUBE_PRIVACY_STATUS || 'public' }}
      YOUTUBE_CATEGORY_ID: ${{ secrets.YOUTUBE_CATEGORY_ID || '22' }}
      YOUTUBE_TAGS: ${{ secrets.YOUTUBE_TAGS || 'podcast,shorts,indonesia' }}
      YOUTUBE_TITLE_PREFIX: ${{ secrets.YOUTUBE_TITLE_PREFIX }}
      YOUTUBE_DESCRIPTION_FOOTER: ${{ secrets.YOUTUBE_DESCRIPTION_FOOTER }}

      PYTHON_CMD: python
      CLIPPER_ROOT: clipper
      CLIP_COUNT: "1"
      MIN_CLIP_SECONDS: "40"
      MAX_CLIP_SECONDS: "60"
      OUTPUT_WIDTH: "1080"
      OUTPUT_HEIGHT: "1920"
      VIDEO_LANGUAGE: id
      DOWNLOAD_MAX_HEIGHT: "720"
      DOWNLOAD_COMPRESS_CRF: "30"
      FINAL_RENDER_CRF: "27"
      SMART_CROP_ENABLED: "1"
      SMART_CROP_MODE: auto
      TRANSCRIPT_REVIEW_ENABLED: "1"

      YTDLP_JS_RUNTIMES: node
      YTDLP_REMOTE_COMPONENTS: ejs:github
      YTDLP_COOKIES_TXT: ${{ secrets.YTDLP_COOKIES_TXT }}
      YTDLP_USER_AGENT: ${{ secrets.YTDLP_USER_AGENT }}
      YTDLP_REFERER: https://www.youtube.com/

      YTDLP_SLEEP_REQUESTS: "5"
      YTDLP_SLEEP_INTERVAL: "8"
      YTDLP_MAX_SLEEP_INTERVAL: "18"
      YTDLP_RETRIES: "3"
      YTDLP_FRAGMENT_RETRIES: "3"
      YTDLP_RETRY_SLEEP: "exp=10:60"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show trigger info
        shell: bash
        run: |
          echo "Event name: ${{ github.event_name }}"
          echo "Schedule: ${{ github.event.schedule }}"
          echo "UTC time: $(date -u)"
          echo "Branch/ref: ${{ github.ref }}"
          echo "Commit SHA: ${{ github.sha }}"

      - name: Setup Node with cache
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Python with cache
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: clipper/requirements-offline.txt

      - name: Install FFmpeg
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Restore automation state
        uses: actions/cache@v4
        with:
          path: |
            data/history.json
            data/jobs.json
            data/videos.json
            generated/metadata
            generated/logs
          key: podcast-history-${{ github.run_id }}
          restore-keys: |
            podcast-history-

      - name: Install Node dependencies
        run: npm ci

      - name: Install Python dependencies
        run: python -m pip install -r clipper/requirements-offline.txt

      - name: Update yt-dlp
        shell: bash
        run: |
          python -m pip install -U yt-dlp
          yt-dlp --version

      - name: Write YouTube cookies
        if: ${{ env.YTDLP_COOKIES_TXT != '' }}
        shell: bash
        run: |
          mkdir -p clipper
          printf '%s' "$YTDLP_COOKIES_TXT" > clipper/cookies.txt

          if grep -q '\\n' clipper/cookies.txt; then
            echo "Detected literal \\n in cookies secret. Converting to real newlines..."
            perl -0pi -e 's/\\n/\n/g' clipper/cookies.txt
          fi

          sed -i 's/\r$//' clipper/cookies.txt
          echo "YTDLP_COOKIES_FILE=cookies.txt" >> "$GITHUB_ENV"

      - name: Debug YouTube cookies safely
        if: ${{ env.YTDLP_COOKIES_TXT != '' }}
        shell: bash
        run: |
          echo "Cookies file check:"
          ls -lah clipper/cookies.txt || true

          echo "Cookies bytes:"
          wc -c clipper/cookies.txt || true

          echo "Cookies lines:"
          wc -l clipper/cookies.txt || true

          echo "YouTube/Google cookie rows:"
          COOKIE_ROWS=$(grep -Ei "youtube|google" clipper/cookies.txt | wc -l || true)
          echo "$COOKIE_ROWS"

          echo "First line:"
          head -n 1 clipper/cookies.txt || true

          if [ "$COOKIE_ROWS" -eq 0 ]; then
            echo "::error::cookies.txt tidak punya baris youtube/google. Secret YTDLP_COOKIES_TXT kemungkinan kosong, header doang, atau salah format."
            exit 1
          fi

          FIRST_LINE=$(head -n 1 clipper/cookies.txt || true)
          if [[ "$FIRST_LINE" != "# Netscape HTTP Cookie File"* && "$FIRST_LINE" != "# HTTP Cookie File"* ]]; then
            echo "::warning::Baris pertama cookies bukan format standar Netscape/HTTP Cookie File."
          fi

      - name: Validate required secrets
        shell: bash
        run: |
          missing=0

          for key in \
            PUBLIC_BASE_URL \
            FTP_HOST \
            FTP_USER \
            FTP_PASSWORD \
            FTP_REMOTE_DIR
          do
            if [ -z "${!key}" ]; then
              echo "::error::$key belum diisi di GitHub Secrets"
              missing=1
            fi
          done

          if [ "$INSTAGRAM_UPLOAD_ENABLED" = "true" ]; then
            for key in INSTAGRAM_IG_USER_ID INSTAGRAM_ACCESS_TOKEN
            do
              if [ -z "${!key}" ]; then
                echo "::error::$key belum diisi di GitHub Secrets"
                missing=1
              fi
            done
          fi

          if [ "$YOUTUBE_UPLOAD_ENABLED" = "true" ]; then
            for key in YOUTUBE_CLIENT_ID YOUTUBE_CLIENT_SECRET YOUTUBE_REFRESH_TOKEN
            do
              if [ -z "${!key}" ]; then
                echo "::error::$key belum diisi di GitHub Secrets"
                missing=1
              fi
            done
          fi

          if [ -z "$GEMINI_API_KEY" ] && [ -z "$GEMINI_API_KEY_2" ] && [ -z "$GEMINI_API_KEY_3" ] && [ -z "$GEMINI_API_KEYS" ]; then
            echo "::error::Minimal satu Gemini key harus diisi"
            missing=1
          fi

          exit "$missing"

      - name: Debug effective config
        shell: bash
        run: |
          echo "GRAPH_API_VERSION=$GRAPH_API_VERSION"
          echo "PUBLIC_BASE_URL=$PUBLIC_BASE_URL"
          echo "FTP_REMOTE_DIR=$FTP_REMOTE_DIR"
          echo "INSTAGRAM_UPLOAD_ENABLED=$INSTAGRAM_UPLOAD_ENABLED"
          echo "INSTAGRAM_REEL_UPLOAD_METHOD=$INSTAGRAM_REEL_UPLOAD_METHOD"
          echo "YOUTUBE_UPLOAD_ENABLED=$YOUTUBE_UPLOAD_ENABLED"
          echo "YTDLP_COOKIES_FILE=${YTDLP_COOKIES_FILE:-not_set}"
          echo "YTDLP_JS_RUNTIMES=$YTDLP_JS_RUNTIMES"
          echo "YTDLP_REMOTE_COMPONENTS=$YTDLP_REMOTE_COMPONENTS"
          echo "YTDLP_REFERER=$YTDLP_REFERER"
          echo "YTDLP_SLEEP_REQUESTS=$YTDLP_SLEEP_REQUESTS"
          echo "YTDLP_SLEEP_INTERVAL=$YTDLP_SLEEP_INTERVAL"
          echo "YTDLP_MAX_SLEEP_INTERVAL=$YTDLP_MAX_SLEEP_INTERVAL"
          echo "YTDLP_RETRIES=$YTDLP_RETRIES"
          echo "YTDLP_FRAGMENT_RETRIES=$YTDLP_FRAGMENT_RETRIES"

          if [ -n "$YTDLP_USER_AGENT" ]; then
            echo "YTDLP_USER_AGENT=configured"
          else
            echo "YTDLP_USER_AGENT=not_set"
          fi

      - name: Test YouTube cookies before automation
        if: ${{ env.YTDLP_COOKIES_TXT != '' }}
        working-directory: clipper
        shell: bash
        env:
          TEST_URL: ${{ github.event.inputs.url || 'https://www.youtube.com/watch?v=CojxHgbtM_Y' }}
        run: |
          echo "Testing yt-dlp cookies with URL:"
          echo "$TEST_URL"

          UA_ARGS=()
          if [ -n "$YTDLP_USER_AGENT" ]; then
            UA_ARGS+=(--user-agent "$YTDLP_USER_AGENT")
          fi

          yt-dlp \
            --cookies cookies.txt \
            "${UA_ARGS[@]}" \
            --referer "$YTDLP_REFERER" \
            --js-runtimes "$YTDLP_JS_RUNTIMES" \
            --remote-components "$YTDLP_REMOTE_COMPONENTS" \
            --sleep-requests "$YTDLP_SLEEP_REQUESTS" \
            --sleep-interval "$YTDLP_SLEEP_INTERVAL" \
            --max-sleep-interval "$YTDLP_MAX_SLEEP_INTERVAL" \
            --retries "$YTDLP_RETRIES" \
            --fragment-retries "$YTDLP_FRAGMENT_RETRIES" \
            --retry-sleep "$YTDLP_RETRY_SLEEP" \
            --skip-download \
            --print title \
            "$TEST_URL"

      - name: Check configuration
        run: npm run check

      - name: Generate and publish
        env:
          EVENT_NAME: ${{ github.event_name }}
          THEME: ${{ github.event.inputs.theme || 'auto' }}
          URL: ${{ github.event.inputs.url || '' }}
          RANGE: ${{ github.event.inputs.range || '' }}
        run: |
          args=(--publish --theme "$THEME")

          # Pakai --scheduled hanya saat trigger dari cron schedule.
          # Manual run tidak memakai --scheduled agar tidak kena guard already_published_today.
          if [ "$EVENT_NAME" = "schedule" ]; then
            args+=(--scheduled)
          fi

          if [ -n "$URL" ]; then
            args+=(--url "$URL")
          fi

          if [ -n "$RANGE" ]; then
            args+=(--range "$RANGE")
          fi

          echo "Running command:"
          printf 'node src/run.js'
          printf ' %q' "${args[@]}"
          printf '\n'

          node src/run.js "${args[@]}"
