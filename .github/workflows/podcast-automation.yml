name: Podcast Clipper Automation

on:
  workflow_dispatch:
    inputs:
      theme:
        description: Theme to process
        required: false
        default: auto
      url:
        description: Optional YouTube URL for manual run
        required: false
        default: ""
      range:
        description: Optional manual range, example 00:01:20-00:02:05
        required: false
        default: ""

  schedule:
    # GitHub schedule uses UTC.
    # 22:07 UTC = 05:07 WIB.
    - cron: "7 22 * * *"

concurrency:
  group: podcast-clipper-automation
  cancel-in-progress: false

permissions:
  contents: read
  actions: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    env:
      # GitHub Actions mulai memigrasikan JavaScript actions dari Node 20 ke Node 24.
      # Ini juga membantu mengurangi warning deprecation Node 20 pada workflow.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

      LOCAL_PORT: 8788
      APP_TIMEZONE: Asia/Jakarta
      PUBLIC_BASE_URL: ${{ secrets.PUBLIC_BASE_URL }}
      UPLOAD_DRIVER: ftp
      DRY_RUN: "false"
      AUTO_PUBLISH: "true"
      DEFAULT_THEME: auto
      GRAPH_API_VERSION: v25.0
      INSTAGRAM_UPLOAD_ENABLED: ${{ secrets.INSTAGRAM_UPLOAD_ENABLED || 'true' }}
      YOUTUBE_UPLOAD_ENABLED: ${{ secrets.YOUTUBE_UPLOAD_ENABLED || 'false' }}

      FTP_HOST: ${{ secrets.FTP_HOST }}
      FTP_PORT: ${{ secrets.FTP_PORT || '21' }}
      FTP_USER: ${{ secrets.FTP_USER }}
      FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
      FTP_REMOTE_DIR: ${{ secrets.FTP_REMOTE_DIR }}

      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
      GEMINI_API_KEY_3: ${{ secrets.GEMINI_API_KEY_3 }}
      GEMINI_API_KEYS: ${{ secrets.GEMINI_API_KEYS }}
      GEMINI_MODEL: ${{ secrets.GEMINI_MODEL || 'gemini-flash-latest' }}

      DEEPGRAM_ENABLED: ${{ secrets.DEEPGRAM_ENABLED || '1' }}
      DEEPGRAM_API_KEYS: ${{ secrets.DEEPGRAM_API_KEYS }}
      DEEPGRAM_MODEL: ${{ secrets.DEEPGRAM_MODEL || 'nova-3' }}
      DEEPGRAM_LANGUAGE: id

      INSTAGRAM_IG_USER_ID: ${{ secrets.INSTAGRAM_IG_USER_ID }}
      INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}

      YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
      YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
      YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
      YOUTUBE_PRIVACY_STATUS: ${{ secrets.YOUTUBE_PRIVACY_STATUS || 'public' }}
      YOUTUBE_CATEGORY_ID: ${{ secrets.YOUTUBE_CATEGORY_ID || '22' }}
      YOUTUBE_TAGS: ${{ secrets.YOUTUBE_TAGS || 'podcast,shorts,indonesia' }}
      YOUTUBE_TITLE_PREFIX: ${{ secrets.YOUTUBE_TITLE_PREFIX }}
      YOUTUBE_DESCRIPTION_FOOTER: ${{ secrets.YOUTUBE_DESCRIPTION_FOOTER }}

      PYTHON_CMD: python
      CLIPPER_ROOT: clipper
      CLIP_COUNT: "1"
      MIN_CLIP_SECONDS: "40"
      MAX_CLIP_SECONDS: "60"
      OUTPUT_WIDTH: "1080"
      OUTPUT_HEIGHT: "1920"
      VIDEO_LANGUAGE: id
      DOWNLOAD_MAX_HEIGHT: "720"
      DOWNLOAD_COMPRESS_CRF: "30"
      FINAL_RENDER_CRF: "27"
      SMART_CROP_ENABLED: "1"
      SMART_CROP_MODE: auto
      TRANSCRIPT_REVIEW_ENABLED: "1"
      YTDLP_JS_RUNTIMES: node
      YTDLP_REMOTE_COMPONENTS: ejs:github

      # Pilih salah satu:
      # 1) YTDLP_COOKIES_TXT  = isi cookies.txt mentah/plain text
      # 2) YTDLP_COOKIES_B64  = isi cookies.txt yang sudah di-base64-kan, lebih aman untuk multiline secret
      YTDLP_COOKIES_TXT: ${{ secrets.YTDLP_COOKIES_TXT }}
      YTDLP_COOKIES_B64: ${{ secrets.YTDLP_COOKIES_B64 }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show trigger info
        shell: bash
        run: |
          echo "Event name: ${{ github.event_name }}"
          echo "Schedule: ${{ github.event.schedule }}"
          echo "UTC time: $(date -u)"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install FFmpeg
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Restore automation state
        uses: actions/cache@v4
        with:
          path: |
            data/history.json
            data/jobs.json
            data/videos.json
            generated/metadata
            generated/logs
          key: podcast-history-${{ github.run_id }}
          restore-keys: |
            podcast-history-

      - name: Install Node dependencies
        run: npm ci

      - name: Install Python dependencies
        run: python -m pip install -r clipper/requirements-offline.txt

      - name: Show tool versions
        shell: bash
        run: |
          echo "Node: $(node --version)"
          echo "NPM: $(npm --version)"
          echo "Python: $(python --version)"
          ffmpeg -version | head -n 1
          python -m yt_dlp --version || yt-dlp --version || true

      - name: Write YouTube cookies
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p clipper

          if [ -n "${YTDLP_COOKIES_B64:-}" ]; then
            printf '%s' "$YTDLP_COOKIES_B64" | base64 -d > clipper/cookies.txt
            echo "YTDLP_COOKIES_FILE=cookies.txt" >> "$GITHUB_ENV"
            echo "YouTube cookies written from YTDLP_COOKIES_B64."
          elif [ -n "${YTDLP_COOKIES_TXT:-}" ]; then
            printf '%s\n' "$YTDLP_COOKIES_TXT" > clipper/cookies.txt
            echo "YTDLP_COOKIES_FILE=cookies.txt" >> "$GITHUB_ENV"
            echo "YouTube cookies written from YTDLP_COOKIES_TXT."
          else
            echo "::warning::YTDLP cookies belum diisi. Jika YouTube meminta login / not a bot, isi secret YTDLP_COOKIES_B64 atau YTDLP_COOKIES_TXT."
          fi

      - name: Validate YouTube cookies
        if: ${{ env.YTDLP_COOKIES_TXT != '' || env.YTDLP_COOKIES_B64 != '' }}
        shell: bash
        run: |
          set -euo pipefail

          if [ ! -s clipper/cookies.txt ]; then
            echo "::error::clipper/cookies.txt kosong atau tidak terbentuk. Cek secret YTDLP_COOKIES_TXT / YTDLP_COOKIES_B64."
            exit 1
          fi

          echo "cookies.txt size: $(wc -c < clipper/cookies.txt) bytes"
          echo "cookies.txt first line: $(head -n 1 clipper/cookies.txt)"

          youtube_rows=$(grep -Ei 'youtube\.com|google\.com|youtube' clipper/cookies.txt | wc -l | tr -d ' ')
          echo "YouTube/Google cookie rows: $youtube_rows"

          if [ "$youtube_rows" -eq 0 ]; then
            echo "::error::cookies.txt tidak berisi cookie YouTube/Google. Export ulang cookies dari browser yang sudah login YouTube."
            exit 1
          fi

          if ! head -n 5 clipper/cookies.txt | grep -qi 'Netscape HTTP Cookie File'; then
            echo "::warning::cookies.txt tidak terlihat seperti format Netscape. yt-dlp biasanya butuh format cookies.txt Netscape."
          fi

      - name: Validate required secrets
        shell: bash
        run: |
          set -euo pipefail
          missing=0

          for key in \
            PUBLIC_BASE_URL \
            FTP_HOST \
            FTP_USER \
            FTP_PASSWORD \
            FTP_REMOTE_DIR
          do
            if [ -z "${!key:-}" ]; then
              echo "::error::$key belum diisi di GitHub Secrets"
              missing=1
            fi
          done

          if [ "${INSTAGRAM_UPLOAD_ENABLED:-true}" = "true" ]; then
            for key in INSTAGRAM_IG_USER_ID INSTAGRAM_ACCESS_TOKEN
            do
              if [ -z "${!key:-}" ]; then
                echo "::error::$key belum diisi di GitHub Secrets"
                missing=1
              fi
            done
          fi

          if [ "${YOUTUBE_UPLOAD_ENABLED:-false}" = "true" ]; then
            for key in YOUTUBE_CLIENT_ID YOUTUBE_CLIENT_SECRET YOUTUBE_REFRESH_TOKEN
            do
              if [ -z "${!key:-}" ]; then
                echo "::error::$key belum diisi di GitHub Secrets"
                missing=1
              fi
            done
          fi

          if [ -z "${GEMINI_API_KEY:-}" ] && [ -z "${GEMINI_API_KEY_2:-}" ] && [ -z "${GEMINI_API_KEY_3:-}" ] && [ -z "${GEMINI_API_KEYS:-}" ]; then
            echo "::error::Minimal satu Gemini key harus diisi"
            missing=1
          fi

          exit "$missing"

      - name: Check configuration
        run: npm run check

      - name: Generate and publish
        env:
          THEME: ${{ github.event.inputs.theme || 'auto' }}
          URL: ${{ github.event.inputs.url || '' }}
          RANGE: ${{ github.event.inputs.range || '' }}
        shell: bash
        run: |
          set -euo pipefail
          args=(--publish --scheduled --theme "$THEME")
          if [ -n "$URL" ]; then args+=(--url "$URL"); fi
          if [ -n "$RANGE" ]; then args+=(--range "$RANGE"); fi
          node src/run.js "${args[@]}"
