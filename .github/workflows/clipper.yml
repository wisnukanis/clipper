      - name: Test YouTube cookies before automation
        if: ${{ env.YTDLP_COOKIES_TXT != '' && (github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' || vars.TEST_YOUTUBE_COOKIES == 'true') }}
        working-directory: clipper
        shell: bash
        env:
          TEST_URL: ${{ github.event.inputs.url || 'https://www.youtube.com/watch?v=CojxHgbtM_Y' }}
        run: |
          echo "Testing yt-dlp cookies with URL:"
          echo "$TEST_URL"

          UA_ARGS=()
          if [ -n "$YTDLP_USER_AGENT" ]; then
            UA_ARGS+=(--user-agent "$YTDLP_USER_AGENT")
          fi

          YTDLP_COMMON_TEST_ARGS=(
            "${UA_ARGS[@]}"
            --simulate
            --format "bestaudio/best"
            --print title
          )

          add_ytdlp_test_arg() {
            local option="$1"
            local value="$2"
            local normalized
            normalized="$(printf '%s' "${value:-}" | tr '[:upper:]' '[:lower:]')"
            if [ -n "${value:-}" ] && [ "$normalized" != "0" ] && [ "$normalized" != "false" ] && [ "$normalized" != "off" ] && [ "$normalized" != "none" ] && [ "$normalized" != "null" ]; then
              YTDLP_COMMON_TEST_ARGS+=("$option" "$value")
            fi
          }

          try_without_cookies() {
            local no_cookie_output
            local no_cookie_status

            echo "::warning::Cookies terlihat invalid/terotasi. Mencoba yt-dlp tanpa cookies sebagai fallback untuk video publik..."
            set +e
            no_cookie_output="$(yt-dlp "${YTDLP_COMMON_TEST_ARGS[@]}" "$TEST_URL" 2>&1)"
            no_cookie_status=$?
            set -e

            printf '%s\n' "$no_cookie_output"
            if [ "$no_cookie_status" -eq 0 ]; then
              echo "::warning::yt-dlp berhasil tanpa cookies. Menonaktifkan cookies.txt untuk sisa job agar cookies invalid tidak ikut dipakai."
              mv cookies.txt cookies.invalid.txt
              echo "YTDLP_COOKIES_FILE=" >> "$GITHUB_ENV"
              echo "YTDLP_COOKIES_DISABLED=1" >> "$GITHUB_ENV"
              exit 0
            fi

            pot_provider_enabled="$(printf '%s' "${YTDLP_POT_PROVIDER_ENABLED:-}" | tr '[:upper:]' '[:lower:]')"
            if [ "$pot_provider_enabled" = "true" ] || [ "$pot_provider_enabled" = "1" ]; then
              echo "::warning::Cookie canary masih kena bot-check, tapi PO token provider aktif. Lanjut tanpa cookies agar kandidat sebenarnya dicoba; publish contract tetap akan fail kalau tidak ada YouTube upload ID."
              mv cookies.txt cookies.invalid.txt
              echo "YTDLP_COOKIES_FILE=" >> "$GITHUB_ENV"
              echo "YTDLP_COOKIES_DISABLED=1" >> "$GITHUB_ENV"
              exit 0
            fi

            echo "::error::Cookies invalid dan fallback tanpa cookies juga gagal. Runner GitHub tetap kena bot-check/login."
            return 1
          }

          add_ytdlp_test_arg --referer "$YTDLP_REFERER"
          add_ytdlp_test_arg --js-runtimes "$YTDLP_JS_RUNTIMES"
          add_ytdlp_test_arg --remote-components "$YTDLP_REMOTE_COMPONENTS"
          add_ytdlp_test_arg --extractor-args "$YTDLP_EXTRACTOR_ARGS"
          add_ytdlp_test_arg --sleep-requests "$YTDLP_SLEEP_REQUESTS"
          add_ytdlp_test_arg --sleep-interval "$YTDLP_SLEEP_INTERVAL"
          add_ytdlp_test_arg --max-sleep-interval "$YTDLP_MAX_SLEEP_INTERVAL"
          add_ytdlp_test_arg --retries "$YTDLP_RETRIES"
          add_ytdlp_test_arg --fragment-retries "$YTDLP_FRAGMENT_RETRIES"
          add_ytdlp_test_arg --retry-sleep "$YTDLP_RETRY_SLEEP"
          add_ytdlp_test_arg --socket-timeout "$YTDLP_SOCKET_TIMEOUT"

          COOKIE_TEST_ATTEMPTS="${YTDLP_COOKIE_TEST_ATTEMPTS:-3}"
          COOKIE_TEST_DELAY_SECONDS="${YTDLP_COOKIE_TEST_DELAY_SECONDS:-20}"
          YTDLP_OUTPUT=""
          YTDLP_STATUS=1

          for attempt in $(seq 1 "$COOKIE_TEST_ATTEMPTS"); do
            echo "yt-dlp cookie test attempt $attempt/$COOKIE_TEST_ATTEMPTS"

            set +e
            YTDLP_OUTPUT="$(yt-dlp --cookies cookies.txt "${YTDLP_COMMON_TEST_ARGS[@]}" "$TEST_URL" 2>&1)"
            YTDLP_STATUS=$?
            set -e

            printf '%s\n' "$YTDLP_OUTPUT"

            if [ "$YTDLP_STATUS" -eq 0 ]; then
              echo "yt-dlp cookie and media-format test passed."
              exit 0
            fi

            if printf '%s\n' "$YTDLP_OUTPUT" | grep -Eiq 'challenge solving failed|Requested format is not available|Only images are available|No video formats found'; then
              echo "::error::yt-dlp tidak menemukan format audio/video karena YouTube EJS challenge gagal. Pastikan Node 22+ dan paket yt-dlp-ejs terpasang; jangan lanjut ke proses render."
              exit 1
            fi

            if printf '%s\n' "$YTDLP_OUTPUT" | grep -Eiq 'no longer valid|rotated in the browser'; then
              try_without_cookies || true
              echo "::error::YTDLP_COOKIES_TXT tidak valid/terrotasi. Export ulang cookies YouTube lalu update GitHub Secret YTDLP_COOKIES_TXT, atau isi YTDLP_EXTRACTOR_ARGS jika YouTube membutuhkan PO token."
              exit 1
            fi

            if printf '%s\n' "$YTDLP_OUTPUT" | grep -Eiq 'sign in to confirm|not a bot|use --cookies'; then
              try_without_cookies || true
              echo "::error::YouTube masih meminta login/cookies. Export ulang dari private/incognito session dan jangan buka lagi session itu setelah export, atau isi YTDLP_EXTRACTOR_ARGS jika YouTube membutuhkan PO token."
              exit 1
            fi

            if [ "$attempt" -lt "$COOKIE_TEST_ATTEMPTS" ]; then
              echo "::warning::YouTube/yt-dlp cookie test failed; retrying in ${COOKIE_TEST_DELAY_SECONDS}s..."
              sleep "$COOKIE_TEST_DELAY_SECONDS"
              continue
            fi
          done

          if printf '%s\n' "$YTDLP_OUTPUT" | grep -Eiq 'no longer valid|rotated in the browser'; then
            echo "::error::YTDLP_COOKIES_TXT masih dianggap tidak valid/terrotasi setelah $COOKIE_TEST_ATTEMPTS percobaan. Jika rerun tetap gagal, export ulang dari private/incognito: login YouTube, buka https://www.youtube.com/robots.txt di tab yang sama, export youtube.com cookies format Netscape, lalu update GitHub Secret YTDLP_COOKIES_TXT."
            exit 1
          fi

          if printf '%s\n' "$YTDLP_OUTPUT" | grep -Eiq 'sign in to confirm|not a bot|use --cookies'; then
            echo "::error::YouTube masih meminta login/cookies setelah $COOKIE_TEST_ATTEMPTS percobaan. Ikuti panduan export cookies yt-dlp: gunakan private/incognito session dan jangan buka lagi session itu setelah export."
            exit 1
          fi

          exit "$YTDLP_STATUS"

      - name: Check configuration
        shell: bash
        run: |
          if [ ! -f src/run.js ]; then
            echo "::notice::src/run.js tidak ada; skip npm config check production dan pakai Python fallback saat generate."
          elif node -e "process.exit(require('./package.json').scripts?.check ? 0 : 1)"; then
            npm run check -- --offline
          elif node -e "process.exit(require('./package.json').scripts?.['test:env'] ? 0 : 1)"; then
            npm run test:env
          else
            echo "::warning::Tidak ada npm script check/test:env; skip config check."
          fi

      - name: Generate and publish
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_SCHEDULE: ${{ github.event.schedule || '' }}
          MODE: ${{ github.event.inputs.mode || 'full' }}
          THEME: ${{ github.event.inputs.theme || 'auto' }}
          TARGET_COUNT: ${{ github.event.inputs.target_count || secrets.DAILY_TARGET_MAX || secrets.MAX_SCHEDULED_POSTS_PER_DAY || '5' }}
          SLOT: ${{ github.event.inputs.slot || 'all' }}
          FORCE_PUBLISH_INPUT: ${{ github.event.inputs.force_publish || 'false' }}
          URL: ${{ github.event.inputs.url || '' }}
          RANGE: ${{ github.event.inputs.range || '' }}
          FORCE_REPROCESS: ${{ github.event.inputs.force_reprocess || 'false' }}
        run: |
          if [ "$EVENT_NAME" = "schedule" ] && [ "$EVENT_SCHEDULE" = "0 22 * * *" ]; then
            MODE="discover"
          fi
          if [ "$EVENT_NAME" = "schedule" ]; then
            case "$EVENT_SCHEDULE" in
              "30 2 * * *") SLOT="1" ;;
              "15 5 * * *") SLOT="2" ;;
              "30 12 * * *") SLOT="3" ;;
            esac
          fi

          args=(--theme "$THEME" --mode "$MODE" --target-count "$TARGET_COUNT" --slot "$SLOT")

          # Pakai --scheduled hanya saat trigger dari cron schedule.
          # Manual run tidak memakai --scheduled agar tidak kena guard already_published_today.
          if [ "$EVENT_NAME" = "schedule" ]; then
            args+=(--scheduled)
          fi

          auto_publish="$(printf '%s' "${AUTO_PUBLISH:-false}" | tr '[:upper:]' '[:lower:]')"
          force_publish="$(printf '%s' "$FORCE_PUBLISH_INPUT" | tr '[:upper:]' '[:lower:]')"
          if { [ "$auto_publish" = "true" ] || [ "$auto_publish" = "1" ] || [ "$MODE" = "publish" ] || [ "$force_publish" = "true" ] || [ "$force_publish" = "1" ]; } \
            && [ "$MODE" != "discover" ] && [ "$MODE" != "render" ]; then
            args+=(--publish)
          fi

          if [ "$force_publish" = "true" ] || [ "$force_publish" = "1" ]; then
            args+=(--force-publish)
          fi

          if [ -n "$URL" ]; then
            args+=(--url "$URL")
          fi

          if [ -n "$RANGE" ]; then
            args+=(--range "$RANGE")
          fi

          if [ "$FORCE_REPROCESS" = "true" ] || [ "$FORCE_REPROCESS" = "1" ]; then
            args+=(--force-reprocess)
          fi

          args+=(--quality "$VIDEO_QUALITY_PROFILE")
          if [ "$SLOT" = "all" ]; then
            args+=(--clip-count "$TARGET_COUNT")
          else
            args+=(--clip-count "1")
          fi
          args+=(--ai-provider "$AI_PROVIDER")
          args+=(--use-frame "$VIDEO_FRAME_ENABLED")
          args+=(--use-filter "$VIDEO_FILTER_ENABLED")
          args+=(--use-watermark "$VIDEO_WATERMARK_ENABLED")
          args+=(--subtitle-font "$SUBTITLE_FONT_FAMILY")
          args+=(--subtitle-font-size "$SUBTITLE_FONT_SIZE")
          args+=(--subtitle-margin-v "$SUBTITLE_MARGIN_V")
          args+=(--subtitle-margin-h "$SUBTITLE_MARGIN_H")

          echo "Running command:"
          if [ -f src/run.js ]; then
            printf 'node src/run.js'
            printf ' %q' "${args[@]}"
            printf '\n'
            node src/run.js "${args[@]}"
          elif [ -f clipper/scripts/clipper.py ] || [ -f scripts/clipper.py ]; then
            if [ -z "$URL" ]; then
              echo "::error::src/run.js tidak ada, jadi workflow fallback Python hanya bisa jalan untuk manual URL. Isi input url atau restore pipeline production src/run.js."
              exit 1
            fi

            py_runner="scripts/clipper.py"
            if [ -f clipper/scripts/clipper.py ]; then
              py_runner="clipper/scripts/clipper.py"
            fi

            py_args=("$URL")
            if [ -n "$RANGE" ]; then
              py_args+=(--range "$RANGE")
            fi

            echo "src/run.js tidak ada; fallback ke $py_runner."
            printf 'python %q' "$py_runner"
            printf ' %q' "${py_args[@]}"
            printf '\n'
            python "$py_runner" "${py_args[@]}"
          else
            echo "::error::Tidak menemukan runner: src/run.js, clipper/scripts/clipper.py, atau scripts/clipper.py."
            exit 1
          fi

      - name: Upload rendered review artifacts
        if: ${{ always() && env.AUTO_PUBLISH != 'true' }}
        uses: actions/upload-artifact@v5
        with:
          name: clipper-rendered-review-${{ github.run_id }}
          if-no-files-found: ignore
          path: |
            data/generated/videos/**
            data/generated/thumbnails/**
            data/generated/metadata/**
            generated/videos/**
            generated/thumbnails/**
            generated/metadata/**
            data/queues/**

