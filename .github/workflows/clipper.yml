name: Clipper Daily Automation

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Pipeline mode: discover, render, publish, full"
        required: false
        default: full
      theme:
        description: "Theme to process: auto, motivasi_renungan, sejarah_tokoh, kisah_islami, fakta_sains, misteri_trending"
        required: false
        default: auto
      target_count:
        description: "Target video count for today: 4 or 5"
        required: false
        default: "5"
      slot:
        description: "Slot to process: all, 1, 2, 3, 4, 5"
        required: false
        default: all
      force_publish:
        description: "Force publish even on manual run: false/true"
        required: false
        default: "false"
      url:
        description: Optional YouTube URL for manual run
        required: false
        default: ""
      range:
        description: Optional manual range, example 00:01:20-00:02:05
        required: false
        default: ""
      force_reprocess:
        description: "Force manual URL even if duplicate history exists: true/false"
        required: false
        default: "false"
      quality_profile:
        description: "Video quality profile: fast, standard, high, ultra"
        required: false
        default: standard
      deepgram_enabled:
        description: "Deepgram transcription is required: use 1"
        required: false
        default: "1"
      subtitle_font:
        description: Subtitle font family
        required: false
        default: "Selawik Semibold"
      subtitle_font_size:
        description: Subtitle font size
        required: false
        default: "46"
      subtitle_margin_v:
        description: Subtitle bottom margin
        required: false
        default: "550"
      subtitle_margin_h:
        description: Subtitle side margin
        required: false
        default: "180"
      scene_mode:
        description: "Scene mode: podcast, solo, game, reaction, sport, auto, active_speaker, center"
        required: false
        default: "podcast"
      clip_count:
        description: How many clips to render from the source video
        required: false
        default: "2"
      use_frame:
        description: "Apply Emsa frame: true/false"
        required: false
        default: "true"
      use_filter:
        description: "Apply light uniqueness filter: true/false"
        required: false
        default: "true"
      use_watermark:
        description: "Apply transparent logo watermark: true/false"
        required: false
        default: "true"
      background_music_enabled:
        description: "Mix local backsound: 0/1"
        required: false
        default: "1"
      background_music_file:
        description: "Path backsound, use auto for theme mapping"
        required: false
        default: "auto"
      background_music_map_file:
        description: "Backsound mapping JSON"
        required: false
        default: "assets/music/music-map.json"
      background_music_volume:
        description: "Backsound volume, example 0.06"
        required: false
        default: "0.06"
      ai_provider:
        description: "AI teks dikunci ke OpenAI; input lama diabaikan"
        required: false
        default: "openai"
  schedule:
    # GitHub schedule uses UTC.
    # Prepare/render sebelum slot pertama: 05:00 WIB = 22:00 UTC hari sebelumnya.
    # Jadwal publish 3x/hari agar kategori bisa bergantian tanpa terlalu rapat.
    # 09:30 WIB = 02:30 UTC.
    # 12:15 WIB = 05:15 UTC.
    # 19:30 WIB = 12:30 UTC.
    - cron: "0 22 * * *"
    - cron: "30 2 * * *"
    - cron: "15 5 * * *"
    - cron: "30 12 * * *"

concurrency:
  group: podcast-clipper-automation
  cancel-in-progress: false

permissions:
  contents: read
  actions: write

jobs:
  publish:
    name: ${{ github.event_name == 'schedule' && github.event.schedule == '0 22 * * *' && 'Discover candidates (no upload expected)' || 'Generate and publish to YouTube' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 90

    env:
      LOCAL_PORT: 8788
      APP_TIMEZONE: Asia/Jakarta
      NPM_CONFIG_AUDIT: "false"
      NPM_CONFIG_FUND: "false"
      NPM_CONFIG_PREFER_OFFLINE: "true"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PIP_PREFER_BINARY: "1"

      PUBLIC_BASE_URL: ${{ secrets.PUBLIC_BASE_URL }}
      UPLOAD_DRIVER: sftp
      REMOTE_UPLOAD_REQUIRED: ${{ secrets.REMOTE_UPLOAD_REQUIRED || 'false' }}
      DRY_RUN: "false"
      AUTO_PUBLISH: ${{ secrets.AUTO_PUBLISH || 'true' }}
      DEFAULT_THEME: auto
      FAST_PRODUCTION_MODE: ${{ secrets.FAST_PRODUCTION_MODE || 'false' }}
      CONTENT_TYPES: ${{ secrets.CONTENT_TYPES || 'podcast_lucu_hikmah,inspiratif_hikmah' }}
      DAILY_TARGET_MIN: ${{ secrets.DAILY_TARGET_MIN || '2' }}
      DAILY_TARGET_MAX: ${{ github.event.inputs.target_count || secrets.DAILY_TARGET_MAX || secrets.MAX_SCHEDULED_POSTS_PER_DAY || '3' }}
      DAILY_THEME_MODE: ${{ secrets.DAILY_THEME_MODE || 'mixed_daily' }}
      DAILY_CONTENT_MIX: ${{ secrets.DAILY_CONTENT_MIX || 'podcast_lucu_hikmah:2,inspiratif_hikmah:1' }}
      DAILY_CONTENT_MIX_4: ${{ secrets.DAILY_CONTENT_MIX_4 || 'podcast_lucu_hikmah:2,inspiratif_hikmah:1' }}
      DAILY_EXPERIMENT_SLOT: ${{ secrets.DAILY_EXPERIMENT_SLOT || 'podcast_lucu_hikmah' }}
      DAILY_EXPERIMENT_ALLOW_OPINI: ${{ secrets.DAILY_EXPERIMENT_ALLOW_OPINI || 'false' }}
      DAILY_EXPERIMENT_MAX_OPINI_PER_DAY: ${{ secrets.DAILY_EXPERIMENT_MAX_OPINI_PER_DAY || '1' }}
      MONDAY_THEME: ${{ secrets.MONDAY_THEME || 'motivasi_renungan' }}
      TUESDAY_THEME: ${{ secrets.TUESDAY_THEME || 'sejarah_tokoh' }}
      WEDNESDAY_THEME: ${{ secrets.WEDNESDAY_THEME || 'kisah_islami' }}
      THURSDAY_THEME: ${{ secrets.THURSDAY_THEME || 'fakta_sains' }}
      FRIDAY_THEME: ${{ secrets.FRIDAY_THEME || 'motivasi_renungan' }}
      SATURDAY_THEME: ${{ secrets.SATURDAY_THEME || 'misteri_trending' }}
      SUNDAY_THEME: ${{ secrets.SUNDAY_THEME || 'kisah_islami' }}
      DAILY_PUBLISH_SLOTS_WIB: ${{ secrets.DAILY_PUBLISH_SLOTS_WIB || '09:30,12:15,19:30' }}
      SLOT_1_TIME_WIB: ${{ secrets.SLOT_1_TIME_WIB || '09:30' }}
      SLOT_1_CONTENT_TYPE: ${{ secrets.SLOT_1_CONTENT_TYPE || 'podcast_lucu_hikmah' }}
      SLOT_2_TIME_WIB: ${{ secrets.SLOT_2_TIME_WIB || '12:15' }}
      SLOT_2_CONTENT_TYPE: ${{ secrets.SLOT_2_CONTENT_TYPE || 'inspiratif_hikmah' }}
      SLOT_3_TIME_WIB: ${{ secrets.SLOT_3_TIME_WIB || '19:30' }}
      SLOT_3_CONTENT_TYPE: ${{ secrets.SLOT_3_CONTENT_TYPE || 'podcast_lucu_hikmah' }}
      SLOT_4_TIME_WIB: ${{ secrets.SLOT_4_TIME_WIB || '16:30' }}
      SLOT_4_CONTENT_TYPE: ${{ secrets.SLOT_4_CONTENT_TYPE || 'inspiratif_hikmah' }}
      SLOT_5_TIME_WIB: ${{ secrets.SLOT_5_TIME_WIB || '19:30' }}
      SLOT_5_CONTENT_TYPE: ${{ secrets.SLOT_5_CONTENT_TYPE || 'podcast_lucu_hikmah' }}

      GRAPH_API_VERSION: v25.0
      API_CHECK_TIMEOUT_SECONDS: ${{ secrets.API_CHECK_TIMEOUT_SECONDS || '90' }}

      INSTAGRAM_UPLOAD_ENABLED: ${{ secrets.INSTAGRAM_UPLOAD_ENABLED || 'true' }}
      INSTAGRAM_REEL_UPLOAD_METHOD: ${{ secrets.INSTAGRAM_REEL_UPLOAD_METHOD || 'resumable' }}
      INSTAGRAM_MAX_UPLOAD_BYTES: ${{ secrets.INSTAGRAM_MAX_UPLOAD_BYTES || '7800000' }}
      FACEBOOK_UPLOAD_ENABLED: ${{ secrets.FACEBOOK_UPLOAD_ENABLED || 'true' }}
      FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
      FACEBOOK_PAGE_ACCESS_TOKEN: ${{ secrets.FACEBOOK_PAGE_ACCESS_TOKEN }}
      FACEBOOK_USER_ACCESS_TOKEN: ${{ secrets.FACEBOOK_USER_ACCESS_TOKEN }}
      AUTO_REFRESH_FACEBOOK_TOKEN: ${{ secrets.AUTO_REFRESH_FACEBOOK_TOKEN || 'true' }}
      FACEBOOK_MEDIA_TYPE: ${{ secrets.FACEBOOK_MEDIA_TYPE || 'reel' }}
      FACEBOOK_REEL_UPLOAD_METHOD: ${{ secrets.FACEBOOK_REEL_UPLOAD_METHOD || 'file' }}
      FACEBOOK_VIDEO_STATE: ${{ secrets.FACEBOOK_VIDEO_STATE || 'PUBLISHED' }}
      FACEBOOK_TITLE_PREFIX: ${{ secrets.FACEBOOK_TITLE_PREFIX }}

      YOUTUBE_UPLOAD_ENABLED: ${{ secrets.YOUTUBE_UPLOAD_ENABLED || 'true' }}
      YOUTUBE_PUBLISH_REQUIRED: ${{ secrets.YOUTUBE_PUBLISH_REQUIRED || 'true' }}
      PENDING_UPLOAD_MAX_AGE_DAYS: ${{ secrets.PENDING_UPLOAD_MAX_AGE_DAYS || '7' }}

      TIKTOK_UPLOAD_PAUSED: ${{ secrets.TIKTOK_UPLOAD_PAUSED || 'true' }}
      TIKTOK_UPLOAD_ENABLED: ${{ secrets.TIKTOK_UPLOAD_ENABLED || 'false' }}
      TIKTOK_CLIENT_KEY: ${{ secrets.TIKTOK_CLIENT_KEY }}
      TIKTOK_CLIENT_SECRET: ${{ secrets.TIKTOK_CLIENT_SECRET }}
      TIKTOK_ACCESS_TOKEN: ${{ secrets.TIKTOK_ACCESS_TOKEN }}
      TIKTOK_REFRESH_TOKEN: ${{ secrets.TIKTOK_REFRESH_TOKEN }}
      TIKTOK_OPEN_ID: ${{ secrets.TIKTOK_OPEN_ID }}
      TIKTOK_SCOPE: ${{ secrets.TIKTOK_SCOPE }}
      TIKTOK_REDIRECT_URI: ${{ secrets.TIKTOK_REDIRECT_URI || 'https://razqabermain.com/ig-generated/auth/tiktok/callback.php' }}
      TIKTOK_PUBLISH_MODE: ${{ secrets.TIKTOK_PUBLISH_MODE || 'direct' }}
      TIKTOK_PRIVACY_LEVEL: ${{ secrets.TIKTOK_PRIVACY_LEVEL || 'SELF_ONLY' }}
      TIKTOK_DISABLE_DUET: ${{ secrets.TIKTOK_DISABLE_DUET || 'false' }}
      TIKTOK_DISABLE_COMMENT: ${{ secrets.TIKTOK_DISABLE_COMMENT || 'false' }}
      TIKTOK_DISABLE_STITCH: ${{ secrets.TIKTOK_DISABLE_STITCH || 'false' }}
      TIKTOK_COVER_TIMESTAMP_MS: ${{ secrets.TIKTOK_COVER_TIMESTAMP_MS || '1000' }}

      THREADS_UPLOAD_ENABLED: ${{ secrets.THREADS_UPLOAD_ENABLED || 'false' }}
      THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
      THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
      THREADS_API_VERSION: ${{ secrets.THREADS_API_VERSION || 'v1.0' }}
      AUTO_REFRESH_THREADS_TOKEN: ${{ secrets.AUTO_REFRESH_THREADS_TOKEN || 'true' }}
      THREADS_TOKEN_ISSUED_AT: ${{ secrets.THREADS_TOKEN_ISSUED_AT }}
      THREADS_APP_SECRET: ${{ secrets.THREADS_APP_SECRET }}
      THREADS_CONTAINER_POLL_SECONDS: ${{ secrets.THREADS_CONTAINER_POLL_SECONDS || '6' }}
      THREADS_CONTAINER_MAX_ATTEMPTS: ${{ secrets.THREADS_CONTAINER_MAX_ATTEMPTS || '90' }}

      SFTP_HOST: ${{ secrets.SFTP_HOST || secrets.FTP_HOST }}
      SFTP_PORT: ${{ secrets.SFTP_PORT || '65002' }}
      SFTP_USER: ${{ secrets.SFTP_USER }}
      SFTP_PASSWORD: ${{ secrets.SFTP_PASSWORD || secrets.FTP_PASSWORD }}
      SFTP_PRIVATE_KEY: ${{ secrets.SFTP_PRIVATE_KEY }}
      SFTP_PASSPHRASE: ${{ secrets.SFTP_PASSPHRASE }}
      SFTP_REMOTE_DIR: ${{ secrets.SFTP_REMOTE_DIR }}
      SFTP_TIMEOUT_SECONDS: ${{ secrets.SFTP_TIMEOUT_SECONDS || secrets.FTP_TIMEOUT_SECONDS || '30' }}
      SFTP_UPLOAD_TIMEOUT_SECONDS: ${{ secrets.SFTP_UPLOAD_TIMEOUT_SECONDS || secrets.FTP_UPLOAD_TIMEOUT_SECONDS || '1800' }}
      SFTP_CLEANUP_TIMEOUT_SECONDS: ${{ secrets.SFTP_CLEANUP_TIMEOUT_SECONDS || secrets.FTP_CLEANUP_TIMEOUT_SECONDS || '600' }}
      SFTP_STATE_TIMEOUT_SECONDS: ${{ secrets.SFTP_STATE_TIMEOUT_SECONDS || secrets.FTP_STATE_TIMEOUT_SECONDS || '30' }}
      SFTP_PRECHECK_TIMEOUT_SECONDS: ${{ secrets.SFTP_PRECHECK_TIMEOUT_SECONDS || secrets.FTP_PRECHECK_TIMEOUT_SECONDS || '12' }}
      SFTP_PRECHECK_RETRIES: ${{ secrets.SFTP_PRECHECK_RETRIES || secrets.FTP_PRECHECK_RETRIES || '1' }}
      SFTP_UPLOAD_RETRIES: ${{ secrets.SFTP_UPLOAD_RETRIES || secrets.FTP_UPLOAD_RETRIES || '4' }}
      SFTP_PUBLIC_URL_RETRIES: ${{ secrets.SFTP_PUBLIC_URL_RETRIES || secrets.FTP_PUBLIC_URL_RETRIES || '8' }}
      SFTP_PUBLIC_URL_RETRY_DELAY_MS: ${{ secrets.SFTP_PUBLIC_URL_RETRY_DELAY_MS || secrets.FTP_PUBLIC_URL_RETRY_DELAY_MS || '2500' }}

      AI_PROVIDER: openai
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL || 'https://api.openai.com/v1' }}
      OPENAI_MODEL: ${{ secrets.OPENAI_MODEL || 'gpt-4.1-nano' }}
      OPENAI_MODELS: ${{ secrets.OPENAI_MODELS || 'gpt-4.1-nano,gpt-5-nano,gpt-4o-mini' }}
      OPENAI_TEMPERATURE: ${{ secrets.OPENAI_TEMPERATURE || '0.35' }}
      OPENAI_TRANSCRIBE_MODEL: ${{ secrets.OPENAI_TRANSCRIBE_MODEL || 'gpt-4o-mini-transcribe' }}
      AI_REQUEST_TIMEOUT_SECONDS: ${{ secrets.AI_REQUEST_TIMEOUT_SECONDS || '25' }}
      TRANSCRIBE_PROVIDER: ${{ secrets.TRANSCRIBE_PROVIDER || 'deepgram' }}
      MAX_SCHEDULED_POSTS_PER_DAY: ${{ github.event.inputs.target_count || secrets.MAX_SCHEDULED_POSTS_PER_DAY || secrets.DAILY_TARGET_MAX || '3' }}
      DEEPGRAM_ENABLED: ${{ github.event.inputs.deepgram_enabled || '1' }}
      DEEPGRAM_API_KEYS: ${{ secrets.DEEPGRAM_API_KEYS }}
      DEEPGRAM_MODEL: ${{ secrets.DEEPGRAM_MODEL || 'nova-3' }}
      DEEPGRAM_LANGUAGE: id
      DEEPGRAM_TIMEOUT_SECONDS: ${{ secrets.DEEPGRAM_TIMEOUT_SECONDS || '900' }}
      DEEPGRAM_AUDIO_BITRATE: ${{ secrets.DEEPGRAM_AUDIO_BITRATE || '32k' }}
      DEEPGRAM_AUDIO_SAMPLE_RATE: ${{ secrets.DEEPGRAM_AUDIO_SAMPLE_RATE || '16000' }}

      INSTAGRAM_IG_USER_ID: ${{ secrets.INSTAGRAM_IG_USER_ID }}
      INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
      META_APP_ID: ${{ secrets.META_APP_ID }}
      META_APP_SECRET: ${{ secrets.META_APP_SECRET }}
      AUTO_REFRESH_INSTAGRAM_TOKEN: ${{ secrets.AUTO_REFRESH_INSTAGRAM_TOKEN || 'true' }}
      INSTAGRAM_CONTAINER_POLL_SECONDS: ${{ secrets.INSTAGRAM_CONTAINER_POLL_SECONDS || '6' }}
      INSTAGRAM_CONTAINER_MAX_ATTEMPTS: ${{ secrets.INSTAGRAM_CONTAINER_MAX_ATTEMPTS || '90' }}
      TOKEN_REFRESH_BEFORE_DAYS: ${{ secrets.TOKEN_REFRESH_BEFORE_DAYS || '10' }}
      AUTO_DISCOVER_VIDEOS: ${{ secrets.AUTO_DISCOVER_VIDEOS || 'true' }}
      THEME_AWARE_DISCOVERY: ${{ secrets.THEME_AWARE_DISCOVERY || 'true' }}
      AUTO_DISCOVER_QUERY: ${{ secrets.AUTO_DISCOVER_QUERY || vars.AUTO_DISCOVER_QUERY || 'motivasi hidup indonesia|sejarah indonesia|kisah islami penuh hikmah|fakta unik indonesia|sains ringan indonesia|misteri sejarah indonesia|fenomena menarik dunia|pengetahuan populer indonesia' }}
      AUTO_DISCOVER_DAILY_QUERY: ${{ secrets.AUTO_DISCOVER_DAILY_QUERY || vars.AUTO_DISCOVER_DAILY_QUERY || 'motivasi hidup indonesia|sejarah tokoh indonesia|kisah islami penuh hikmah|fakta unik indonesia|misteri sejarah indonesia' }}
      MOTIVASI_RENUNGAN_DISCOVER_QUERY: ${{ secrets.MOTIVASI_RENUNGAN_DISCOVER_QUERY || vars.MOTIVASI_RENUNGAN_DISCOVER_QUERY || 'motivasi hidup indonesia|renungan hidup|nasihat kehidupan|kisah perjuangan hidup|pengembangan diri indonesia|nasihat orang tua|cerita inspiratif indonesia|motivasi kerja keras|hidup sederhana bermakna|pelajaran hidup' }}
      SEJARAH_TOKOH_DISCOVER_QUERY: ${{ secrets.SEJARAH_TOKOH_DISCOVER_QUERY || vars.SEJARAH_TOKOH_DISCOVER_QUERY || 'sejarah indonesia|tokoh indonesia inspiratif|kisah nyata tokoh dunia|biografi tokoh indonesia|sejarah tokoh islam aman|kisah pahlawan indonesia|cerita sejarah singkat|fakta sejarah indonesia|kisah nyata inspiratif|tokoh dunia berpengaruh' }}
      KISAH_ISLAMI_DISCOVER_QUERY: ${{ secrets.KISAH_ISLAMI_DISCOVER_QUERY || vars.KISAH_ISLAMI_DISCOVER_QUERY || 'kisah islami penuh hikmah|hikmah kehidupan islam|cerita islami singkat|nilai moral islami|kisah sahabat nabi penuh hikmah|ceramah pendek islam adem|nasihat agama islam|akhlak mulia islam|kisah teladan islam|renungan islami' }}
      FAKTA_SAINS_DISCOVER_QUERY: ${{ secrets.FAKTA_SAINS_DISCOVER_QUERY || vars.FAKTA_SAINS_DISCOVER_QUERY || 'fakta unik indonesia|sains ringan indonesia|pengetahuan populer|fakta psikologi ringan|fakta tubuh manusia|teknologi sederhana|fenomena alam dijelaskan|edukasi sains indonesia|fakta sejarah populer|ilmu pengetahuan umum' }}
      MISTERI_TRENDING_DISCOVER_QUERY: ${{ secrets.MISTERI_TRENDING_DISCOVER_QUERY || vars.MISTERI_TRENDING_DISCOVER_QUERY || 'misteri sejarah indonesia|fenomena menarik dunia|fakta unik misterius|teka teki sejarah|tempat bersejarah misterius|fenomena alam unik|trending edukatif indonesia|kisah nyata penuh tanda tanya|misteri arkeologi|fakta menarik trending aman' }}
      AUTO_DISCOVER_USE_API: ${{ secrets.AUTO_DISCOVER_USE_API || 'true' }}
      AUTO_DISCOVER_CHANNEL_FIRST: ${{ secrets.AUTO_DISCOVER_CHANNEL_FIRST || 'true' }}
      AUTO_DISCOVER_QUERY_FIRST: ${{ secrets.AUTO_DISCOVER_QUERY_FIRST || 'false' }}
      AUTO_DISCOVER_MIX_CHANNEL_AND_QUERY: ${{ secrets.AUTO_DISCOVER_MIX_CHANNEL_AND_QUERY || 'true' }}
      AUTO_DISCOVER_CHANNEL_WEIGHT: ${{ secrets.AUTO_DISCOVER_CHANNEL_WEIGHT || '0.65' }}
      AUTO_DISCOVER_QUERY_WEIGHT: ${{ secrets.AUTO_DISCOVER_QUERY_WEIGHT || '0.35' }}
      AUTO_DISCOVER_ALLOW_OAUTH: ${{ secrets.AUTO_DISCOVER_ALLOW_OAUTH || 'false' }}
      AUTO_DISCOVER_DAILY_SEARCH_ONLY: ${{ secrets.AUTO_DISCOVER_DAILY_SEARCH_ONLY || 'true' }}
      AUTO_DISCOVER_DAILY_SEARCH_RESULTS: ${{ secrets.AUTO_DISCOVER_DAILY_SEARCH_RESULTS || '7' }}
      AUTO_DISCOVER_TRENDING_ENABLED: ${{ secrets.AUTO_DISCOVER_TRENDING_ENABLED || 'true' }}
      AUTO_DISCOVER_TRENDING_CATEGORY_IDS: ${{ secrets.AUTO_DISCOVER_TRENDING_CATEGORY_IDS || '22,all' }}
      AUTO_DISCOVER_TRENDING_MAX_RESULTS: ${{ secrets.AUTO_DISCOVER_TRENDING_MAX_RESULTS || '25' }}
      AUTO_DISCOVER_TRENDING_MAX_AGE_HOURS: ${{ secrets.AUTO_DISCOVER_TRENDING_MAX_AGE_HOURS || '48' }}
      AUTO_DISCOVER_CACHE_SYNC_IMMEDIATE: ${{ secrets.AUTO_DISCOVER_CACHE_SYNC_IMMEDIATE || 'true' }}
      AUTO_DISCOVER_VALIDATE_URL: ${{ secrets.AUTO_DISCOVER_VALIDATE_URL || 'true' }}
      AUTO_DISCOVER_MAX_RESULTS: ${{ secrets.AUTO_DISCOVER_MAX_RESULTS || '12' }}
      AUTO_DISCOVER_ADD_COUNT: ${{ secrets.AUTO_DISCOVER_ADD_COUNT || '5' }}
      AUTO_DISCOVER_DAILY_QUEUE_LIMIT: ${{ secrets.AUTO_DISCOVER_DAILY_QUEUE_LIMIT || '25' }}
      AUTO_DISCOVER_EXPIRE_OLD_QUEUE: ${{ secrets.AUTO_DISCOVER_EXPIRE_OLD_QUEUE || 'true' }}
      AUTO_DISCOVER_QUEUE_TTL_DAYS: ${{ secrets.AUTO_DISCOVER_QUEUE_TTL_DAYS || '2' }}
      AUTO_DISCOVER_MIN_DURATION_SECONDS: ${{ secrets.AUTO_DISCOVER_MIN_DURATION_SECONDS || '600' }}
      AUTO_DISCOVER_MAX_DURATION_SECONDS: ${{ secrets.AUTO_DISCOVER_MAX_DURATION_SECONDS || '10800' }}
      AUTO_DISCOVER_MIN_VIEWS: ${{ secrets.AUTO_DISCOVER_MIN_VIEWS || '15000' }}
      AUTO_DISCOVER_MIN_VIEWS_PER_HOUR: ${{ secrets.AUTO_DISCOVER_MIN_VIEWS_PER_HOUR || '250' }}
      AUTO_DISCOVER_PUBLISHED_AFTER_DAYS: ${{ secrets.AUTO_DISCOVER_PUBLISHED_AFTER_DAYS || '5' }}
      AUTO_DISCOVER_FALLBACK_MAX_RESULTS: ${{ secrets.AUTO_DISCOVER_FALLBACK_MAX_RESULTS || '15' }}
      AUTO_DISCOVER_REGION_CODE: ${{ secrets.AUTO_DISCOVER_REGION_CODE || 'ID' }}
      AUTO_DISCOVER_RELEVANCE_LANGUAGE: ${{ secrets.AUTO_DISCOVER_RELEVANCE_LANGUAGE || 'id' }}
      AUTO_DISCOVER_EXCLUDE_SHORTS: ${{ secrets.AUTO_DISCOVER_EXCLUDE_SHORTS || 'true' }}
      AUTO_DISCOVER_EXCLUDE_LIVE: ${{ secrets.AUTO_DISCOVER_EXCLUDE_LIVE || 'true' }}
      AUTO_DISCOVER_EXCLUDE_PREMIERE: ${{ secrets.AUTO_DISCOVER_EXCLUDE_PREMIERE || 'true' }}
      AUTO_DISCOVER_REQUIRE_TRANSCRIPT_OR_AUDIO: ${{ secrets.AUTO_DISCOVER_REQUIRE_TRANSCRIPT_OR_AUDIO || 'true' }}
      AUTO_DISCOVER_CHANNEL_IDS: ${{ secrets.AUTO_DISCOVER_CHANNEL_IDS }}
      AUTO_DISCOVER_CHANNEL_HANDLES: ${{ secrets.AUTO_DISCOVER_CHANNEL_HANDLES }}
      MOTIVASI_RENUNGAN_CHANNEL_HANDLES: ${{ secrets.MOTIVASI_RENUNGAN_CHANNEL_HANDLES || secrets.AUTO_DISCOVER_CHANNEL_HANDLES }}
      SEJARAH_TOKOH_CHANNEL_HANDLES: ${{ secrets.SEJARAH_TOKOH_CHANNEL_HANDLES }}
      KISAH_ISLAMI_CHANNEL_HANDLES: ${{ secrets.KISAH_ISLAMI_CHANNEL_HANDLES }}
      FAKTA_SAINS_CHANNEL_HANDLES: ${{ secrets.FAKTA_SAINS_CHANNEL_HANDLES }}
      MISTERI_TRENDING_CHANNEL_HANDLES: ${{ secrets.MISTERI_TRENDING_CHANNEL_HANDLES }}
      AUTO_DISCOVER_FRESH_UPLOAD_DAYS: ${{ secrets.AUTO_DISCOVER_FRESH_UPLOAD_DAYS || '1' }}
      AUTO_DISCOVER_CHANNEL_MAX_RESULTS: ${{ secrets.AUTO_DISCOVER_CHANNEL_MAX_RESULTS || '3' }}
      QUEUE_FAILOVER_ATTEMPTS: ${{ secrets.QUEUE_FAILOVER_ATTEMPTS || '3' }}
      AUTO_CLASSIFY_CONTENT_TYPE: ${{ secrets.AUTO_CLASSIFY_CONTENT_TYPE || 'true' }}
      LOW_CONFIDENCE_TO_REVIEW: ${{ secrets.LOW_CONFIDENCE_TO_REVIEW || 'true' }}
      MIN_CLASSIFICATION_CONFIDENCE: ${{ secrets.MIN_CLASSIFICATION_CONFIDENCE || '0.60' }}
      SOURCE_REUSE_COOLDOWN_DAYS: ${{ secrets.SOURCE_REUSE_COOLDOWN_DAYS || '7' }}
      PUBLISHED_SOURCE_LOOKBACK_DAYS: ${{ secrets.PUBLISHED_SOURCE_LOOKBACK_DAYS || '30' }}
      DISCOVER_QUEUE_LOOKBACK_DAYS: ${{ secrets.DISCOVER_QUEUE_LOOKBACK_DAYS || '7' }}
      TITLE_SIMILARITY_LOOKBACK_DAYS: ${{ secrets.TITLE_SIMILARITY_LOOKBACK_DAYS || '14' }}
      ALLOW_MULTIPLE_CLIPS_PER_SOURCE: ${{ secrets.ALLOW_MULTIPLE_CLIPS_PER_SOURCE || 'false' }}

